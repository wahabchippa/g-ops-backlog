.rbtn svg{width:13px;height:13px}
.rbtn.spin svg{animation:spin 1s linear infinite}

.main{padding:20px 24px;max-width:1800px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--accent))}
.sl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.sv{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;line-height:1}
.ss{font-size:10px;color:var(--text3);margin-top:4px;font-family:'IBM Plex Mono',monospace}
.sbar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.sbt{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.bar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px;margin-bottom:10px}
.bseg{min-width:2px;border-radius:1px;cursor:pointer;transition:opacity .2s}

.leg{display:flex;flex-wrap:wrap;gap:12px}
.li{display:flex;align-items:center;gap:5px;cursor:pointer;transition:opacity .2s}

.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ll{font-size:11px;color:var(--text2)}
.lc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3)}
.fb{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.sw{position:relative;flex:1;min-width:200px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:14px;height:14px}
.si{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 12px 8px 32px;border-radius:7px;font-family:'Syne',sans-serif;font-size:13px;outline:none}

.fg{display:flex;align-items:center;gap:8px}
.fl{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap}
.rc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.thr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.tt{font-size:13px;font-weight:700}

tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}

tbody tr:last-child{border-bottom:none}

.cd{color:var(--text2)}

function init(){
  all=D;
  populateSels();
  filter();
  renderStats();
  document.getElementById('ts').textContent='Updated: '+new Date().toLocaleTimeString();
}

function reload(){
  document.getElementById('rbtn').classList.add('spin');
  setTimeout(()=>{
    init();
    document.getElementById('rbtn').classList.remove('spin');
  },800);
}

function populateSels(){
  const fill=(id,vals)=>{
    const s=document.getElementById(id);
    const cur=s.value;
    while(s.options.length>1)s.remove(1);
    vals.forEach(v=>{const o=new Option(v,v);s.add(o)});
    s.value=cur;
  };
  fill('fst',[...new Set(all.map(d=>d.st).filter(Boolean))].sort());
  fill('fcc',[...new Set(all.map(d=>d.cc).filter(Boolean))].sort());
  fill('fvn',[...new Set(all.map(d=>d.vn).filter(Boolean))].sort());
  fill('fpt',[...new Set(all.map(d=>d.pt).filter(Boolean))].sort());
}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const st=document.getElementById('fst').value;
  const cc=document.getElementById('fcc').value;
  const vn=document.getElementById('fvn').value;
  const pt=document.getElementById('fpt').value;
  const sr=document.getElementById('srt').value;
  fil=all.filter(d=>{
    if(st&&d.st!==st)return false;
    if(cc&&d.cc!==cc)return false;
    if(vn&&d.vn!==vn)return false;
    if(pt&&d.pt!==pt)return false;
    if(q){const h=[d.on,d.fid,d.cn,d.vn,d.itm,d.tn,d.ce].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  fil.sort((a,b)=>{
    if(sr==='nd')return b.cat.localeCompare(a.cat);
    if(sr==='od')return a.cat.localeCompare(b.cat);
    if(sr==='ah')return b.amt-a.amt;
    if(sr==='al')return a.amt-b.amt;
    return 0;
  });
  document.getElementById('rc').textContent=fil.length.toLocaleString()+' orders';
  pg=1;
  renderTable();
  renderBar(fil);
}

function renderStats(){
  const t=all.length,del=all.filter(d=>d.st==='DELIVERED').length,
    can=all.filter(d=>d.st==='CANCELLED').length,
    qch=all.filter(d=>d.st==='QC_HOLD').length,
    tr=all.filter(d=>['FREIGHT','FREIGHT_DEPARTED','FREIGHT_CUSTOMS','COURIER','COURIER_CUSTOMS'].includes(d.st)).length,
    gmv=all.reduce((s,d)=>s+d.amt,0);
  document.getElementById('stats').innerHTML=`
    <div class="sc" style="--cc:#4f9eff"><div class="sl">Total Orders</div><div class="sv">${t.toLocaleString()}</div><div class="ss">All time</div></div>
    <div class="sc" style="--cc:#22c55e"><div class="sl">Delivered</div><div class="sv">${del.toLocaleString()}</div><div class="ss">${t?((del/t)*100).toFixed(1):0}%</div></div>
    <div class="sc" style="--cc:#f97316"><div class="sl">In Transit</div><div class="sv">${tr.toLocaleString()}</div><div class="ss">Freight + Courier</div></div>
    <div class="sc" style="--cc:#eab308"><div class="sl">QC Hold</div><div class="sv">${qch.toLocaleString()}</div><div class="ss">Needs attention</div></div>
    <div class="sc" style="--cc:#ef4444"><div class="sl">Cancelled</div><div class="sv">${can.toLocaleString()}</div><div class="ss">${t?((can/t)*100).toFixed(1):0}%</div></div>
    <div class="sc" style="--cc:#7b5cf0"><div class="sl">Total GMV</div><div class="sv">£${gmv.toLocaleString('en-GB',{maximumFractionDigits:0})}</div><div class="ss">GBP</div></div>
  `;
}

function renderBar(data){
  const cnt={};data.forEach(d=>cnt[d.st]=(cnt[d.st]||0)+1);
  const tot=data.length||1;
  const srt=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  document.getElementById('bar').innerHTML=srt.map(([s,c])=>{
    const g=gs(s);
    return `<div class="bseg" style="flex:${c};background:${g.c}" title="${g.l}: ${c}" onclick="setFilter('${s}')"></div>`;
  }).join('');
  document.getElementById('leg').innerHTML=srt.map(([s,c])=>{
    const g=gs(s),p=((c/tot)*100).toFixed(1);
    return `<div class="li" onclick="setFilter('${s}')"><div class="ld" style="background:${g.c}"></div><span class="ll">${g.l}</span><span class="lc">${c.toLocaleString()} (${p}%)</span></div>`;
  }).join('');
}

function setFilter(st){document.getElementById('fst').value=st;filter();}

function renderTable(){
  const start=(pg-1)*PS,page=fil.slice(start,start+PS);
  const tb=document.getElementById('tb');
  tb.innerHTML='';
  if(!page.length){tb.innerHTML='<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--text3)">No orders found</td></tr>';return;}
  page.forEach((d,i)=>{
    const g=gs(d.st);
    const amt=d.amt?'£'+d.amt.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
    const eid='ex_'+(start+i);
    const tr=document.createElement('tr');
    tr.onclick=()=>document.getElementById(eid)?.classList.toggle('open');
    tr.innerHTML=`
      <td class="cm" style="font-weight:600;color:var(--accent)">${d.on||'—'}</td>
      <td class="cm cd" style="font-size:11px">${d.fid||'—'}</td>
      <td><span class="badge" style="color:${g.c};background:${g.b}">${g.l}</span></td>
      <td class="cm cq">${d.sd||'—'}</td>
      <td class="cm cq">${d.cat?.split(' ')[0]||'—'}</td>
      <td class="cm" style="font-weight:600">${amt}</td>
      <td class="cd">${d.cn||'—'}</td>
      <td class="cd">${d.cc||'—'}</td>
      <td class="cd">${d.vn||'—'}</td>
      <td class="cq" style="font-size:11px">${d.vz||'—'}</td>
      <td class="cq" style="font-size:11px">${d.pt||'—'}</td>
      <td class="cq" style="font-size:11px">${d.co||'—'}</td>
      <td class="cm cq" style="text-align:center">${d.dy||'—'}</td>
      <td style="color:var(--text3);font-size:10px">▼</td>
    `;
    tb.appendChild(tr);
    const exr=document.createElement('tr');
    exr.id=eid;exr.className='exr';
    const extd=document.createElement('td');
    extd.colSpan=14;extd.className='exc';
    const flds=[['Item',d.itm],['Product Type',d.pt],['Email',d.ce],['Customer Type',d.ct],['Customer Status',d.cs],['Vendor Zone',d.vz],['Courier',d.co],['Tracking #',d.tn],['Shipping',d.sm],['Cancellation Reason',d.cr],['Days to Delivery',d.dy],['QC Hold',d.qch],['Affiliate',d.af],['Bargain Bin',d.bb]].filter(([,v])=>v&&v!=='—'&&v!=='undefined'&&v!='');
    extd.innerHTML='<div class="dg">'+flds.map(([k,v])=>`<div><div class="dk">${k}</div><div class="dv">${v}</div></div>`).join('')+'</div>';
    exr.appendChild(extd);
    tb.appendChild(exr);
  });
  renderPg();
}

function renderPg(){
  const tot=fil.length,pages=Math.ceil(tot/PS);
  const s=(pg-1)*PS+1,e=Math.min(pg*PS,tot);
  document.getElementById('pi').textContent=tot?`${s}–${e} of ${tot.toLocaleString()}`:'0 results';
  const c=document.getElementById('pbs');c.innerHTML='';
  const mk=(lbl,act,dis)=>{const b=document.createElement('button');b.className='pb'+(act?' act':'');b.textContent=lbl;b.disabled=dis;b.onclick=()=>{pg+=0;if(lbl==='← Prev')pg=Math.max(1,pg-1);else if(lbl==='Next →')pg=Math.min(pages,pg+1);else pg=parseInt(lbl);renderTable();window.scrollTo(0,0)};return b};
  c.appendChild(mk('← Prev',false,pg===1));
  const rng=pages<=5?[...Array(pages)].map((_,i)=>i+1):pg<=3?[1,2,3,4,5]:pg>=pages-2?[pages-4,pages-3,pages-2,pages-1,pages]:[pg-2,pg-1,pg,pg+1,pg+2];
  rng.forEach(n=>{if(n>=1&&n<=pages)c.appendChild(mk(String(n),n===pg,false))});
  c.appendChild(mk('Next →',false,pg>=pages));
}

function xcsv(){
  const h=['Order#','Fleek ID','Status','Status Date','Created','Amount','Customer','Email','Country','Vendor','Zone','Product','Courier','Days'];
  const rows=fil.map(d=>[d.on,d.fid,d.st,d.sd,d.cat,d.amt,d.cn,d.ce,d.cc,d.vn,d.vz,d.pt,d.co,d.dy].map(v=>`"${String(v||'').replace(/"/g,'""')}"`));
  const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='g-ops-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

init();
